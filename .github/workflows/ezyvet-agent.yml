name: ezyVet Daily Ingest Agent

# Runs the ezyVet browser-automation worker. Scheduled daily, and manually
# dispatchable (the app's Admin ▸ Agents "Run now" button triggers this via the
# GitHub API, passing run_id/agent_key/target_date).
on:
  schedule:
    # 6:00 AM Pacific, year-round. GitHub cron is UTC-only and has no DST
    # awareness, so we fire at BOTH 13:00 UTC (6 AM PDT) and 14:00 UTC (6 AM
    # PST); the `gate` job below runs the ingest only when the local Pacific
    # hour is actually 06, so exactly one run happens per day.
    - cron: "0 13,14 * * *"
  workflow_dispatch:
    inputs:
      run_id:
        description: "agent_run id (from the app). Leave blank to create one."
        required: false
      agent_key:
        description: "Agent key"
        required: false
        default: "ezyvet_daily_ingest"
      target_date:
        description: "Target date YYYY-MM-DD (default: previous LA day)"
        required: false

concurrency:
  # Never let two ingest runs overlap.
  group: ezyvet-agent
  cancel-in-progress: false

jobs:
  # DST-safe gate: for scheduled runs, proceed only when it is 6 AM in Los
  # Angeles (so the 13:00/14:00 UTC pair collapses to one 6 AM Pacific run).
  # Manual (workflow_dispatch) runs always proceed.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Los_Angeles date +%H)
          echo "Los Angeles hour: $HOUR"
          if [ "$HOUR" = "06" ]; then
            echo "6 AM Pacific — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 6 AM Pacific — skipping this scheduled trigger."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  ingest:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run ezyVet ingest worker
        env:
          EZYVET_LOGIN_URL: ${{ secrets.EZYVET_LOGIN_URL }}
          EZYVET_USERNAME: ${{ secrets.EZYVET_USERNAME }}
          EZYVET_PASSWORD: ${{ secrets.EZYVET_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          RUN_ID: ${{ github.event.inputs.run_id }}
          AGENT_KEY: ${{ github.event.inputs.agent_key || 'ezyvet_daily_ingest' }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: node agent/run.mjs

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ezyvet-agent-debug
          path: .secrets/ezyvet-probe/*.png
          if-no-files-found: ignore
          retention-days: 5
